# munichclimbs monorepo – local development with Docker
# Run: docker compose up -d
# Frontend:    http://localhost:8080
# Backoffice:  http://localhost:8082
# phpMyAdmin:  http://localhost:8081   (user: munich / munich_secret  or  root / root_secret)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_PATH: apps/frontend
        INSTALL_DEV_DEPS: "1"
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      APP_SECRET: frontend_dev_secret
      DATABASE_URL: mysql://munich:munich_secret@mysql:3306/munich?serverVersion=8.0&charset=utf8mb4
    volumes:
      - .:/var/www/html
      - /var/www/html/apps/frontend/vendor
      - ./public/uploads:/var/www/html/apps/frontend/public/uploads
    working_dir: /var/www/html/apps/frontend
    depends_on:
      mysql:
        condition: service_healthy

  backoffice:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_PATH: apps/backoffice
        INSTALL_DEV_DEPS: "1"
    ports:
      - "8082:80"
    environment:
      APP_ENV: dev
      APP_SECRET: backoffice_dev_secret
      DATABASE_URL: mysql://munich:munich_secret@mysql:3306/munich?serverVersion=8.0&charset=utf8mb4
    volumes:
      - .:/var/www/html
      - /var/www/html/apps/backoffice/vendor
      - ./public/uploads:/var/www/html/apps/backoffice/public/uploads
    working_dir: /var/www/html/apps/backoffice
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: munich
      MYSQL_USER: munich
      MYSQL_PASSWORD: munich_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      # Optional: prefill login (user can still choose another)
      # PMA_USER: munich
      # PMA_PASSWORD: munich_secret
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
